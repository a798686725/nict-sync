<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NICT 吊数计算器 V1.6</title>
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { min-height: 100vh; }
body { font-family: 'Microsoft YaHei', Arial, sans-serif; background: #e8eef5; color: #333; }

/* 连接状态栏 */
.sync-status-bar {
  display: flex; justify-content: space-between; align-items: center;
  padding: 6px 16px; background: linear-gradient(135deg, #1b3a1f, #2e7d32);
  font-size: 0.8em; color: #fff; font-weight: 600;
}
.sync-status-bar .status-left { display: flex; align-items: center; gap: 8px; }
.sync-status-bar .status-right { display: flex; align-items: center; gap: 12px; }
.status-dot { width: 8px; height: 8px; border-radius: 50%; background: #ef5350; }
.status-dot.connected { background: #4caf50; animation: pulse 2s infinite; }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
.sync-btn { padding: 4px 12px; border: 1px solid rgba(255,255,255,0.4); border-radius: 12px; background: rgba(255,255,255,0.15); color: #fff; cursor: pointer; font-size: 0.8em; transition: all 0.2s; }
.sync-btn:hover { background: rgba(255,255,255,0.25); }
.sync-btn.active { background: #4caf50; border-color: #4caf50; }
.online-count { background: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 10px; }

/* 主标题 */
.header { background: linear-gradient(135deg, #1565c0 0%, #1976d2 50%, #2196f3 100%); padding: 14px 20px; box-shadow: 0 2px 10px rgba(21, 101, 192, 0.3); }
.header h1 { font-size: 1.4em; color: #fff; font-weight: 600; text-align: center; letter-spacing: 2px; }

.top-tabs { display: flex; justify-content: center; flex-wrap: wrap; gap: 6px; padding: 10px 12px; background: #f0f4f8; border-bottom: 2px solid #d0dff0; }
.group-tab { padding: 7px 16px; border: 2px solid #90caf9; border-radius: 8px; background: #fff; color: #1565c0; font-size: 0.9em; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.group-tab:hover { background: #e3f2fd; border-color: #1565c0; }
.group-tab.active { background: #1565c0; color: #fff; border-color: #1565c0; box-shadow: 0 2px 8px rgba(21,101,192,0.3); }
.stats-tab { padding: 7px 18px; border: 2px solid #2e7d32; border-radius: 8px; background: #fff; color: #2e7d32; font-size: 0.9em; font-weight: 700; cursor: pointer; transition: all 0.2s; }
.stats-tab:hover { background: #e8f5e9; border-color: #2e7d32; }
.stats-tab.active { background: #2e7d32; color: #fff; border-color: #2e7d32; box-shadow: 0 2px 8px rgba(46,125,50,0.3); }

.page-control { text-align: center; margin: 10px 0; display: flex; justify-content: center; align-items: center; gap: 12px; flex-wrap: wrap; }
.page-label { font-size: 1.05em; color: #1565c0; font-weight: bold; }
.group-label { font-size: 0.9em; color: #7b1fa2; font-weight: bold; margin-right: 6px; }
.btn-add-page, .btn-remove-page { padding: 7px 20px; border: 2px solid #7b1fa2; border-radius: 6px; background: #7b1fa2; color: #fff; font-size: 0.88em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-add-page:hover { background: #6a1b9a; border-color: #6a1b9a; }
.btn-remove-page:hover { background: #c62828; border-color: #c62828; }
.btn-remove-page:disabled { background: #ccc; border-color: #ccc; cursor: not-allowed; }

.pages-outer { display: flex; justify-content: center; width: 100%; }
.pages-inner { display: flex; flex-wrap: wrap; gap: 20px; justify-content: center; align-items: flex-start; max-width: 100%; }
.calc-page { flex: 0 0 auto; width: 700px; display: flex; flex-direction: column; gap: 16px; }
.calc-view { display: block; }
.calc-view.hidden { display: none; }

/* 统计视图 */
.stats-view { display: none; width: 100%; }
.stats-view.visible { display: block; }
.stats-title { text-align: center; font-size: 1.3em; color: #1565c0; font-weight: 700; margin: 16px 0 6px; letter-spacing: 3px; }
.stats-subtitle { text-align: center; font-size: 0.85em; color: #90caf9; margin-bottom: 14px; }
.stats-summary { display: flex; justify-content: center; gap: 32px; padding: 12px 24px; background: linear-gradient(135deg, #f0f7ff, #e3f2fd); border-radius: 30px; margin: 0 auto 16px; max-width: 520px; flex-wrap: wrap; box-shadow: 0 2px 12px rgba(21,101,192,0.1); }
.stats-summary-item { font-size: 0.92em; color: #1565c0; font-weight: 700; padding: 4px 12px; background: #fff; border-radius: 20px; border: 1px solid #90caf9; }
.btn-export-stats { padding: 8px 24px; border: 2px solid #2e7d32; border-radius: 20px; background: #fff; color: #2e7d32; font-size: 0.9em; font-weight: 700; cursor: pointer; transition: all 0.2s; margin: 12px auto 16px; display: block; box-shadow: 0 2px 8px rgba(46,125,50,0.15); }
.btn-export-stats:hover { background: #2e7d32; color: #fff; box-shadow: 0 4px 16px rgba(46,125,50,0.3); }

.stats-table-wrapper { border: 2px solid #c8e6c9; border-radius: 14px; overflow: auto; box-shadow: 0 4px 24px rgba(46,125,50,0.12); margin: 0 auto; max-width: 99%; }
.stats-table { width: 100%; border-collapse: collapse; white-space: nowrap; }
.stats-table th { background: linear-gradient(135deg, #2e7d32, #388e3c); padding: 12px 10px; text-align: center; font-size: 0.78em; color: #fff; font-weight: 700; letter-spacing: 0.5px; position: sticky; top: 0; z-index: 2; border-bottom: 2px solid #1b5e20; }
.stats-table td { border: 1px solid #e8eef5; background: #fff; vertical-align: middle; }
.cell-group { background: linear-gradient(135deg, #e3f2fd, #f5f9ff); }
.cell-group .cell-val { font-size: 1.05em; font-weight: 800; color: #1565c0; display: block; text-align: center; }
.cell-group .cell-sub { font-size: 0.72em; color: #888; display: block; text-align: center; margin-top: 2px; font-weight: 400; }
.cell-remark { background: linear-gradient(135deg, #fff5f5, #fff); text-align: left; padding: 8px 12px; vertical-align: middle; }
.cell-remark .remark-text { font-size: 0.85em; color: #c62828; font-weight: 700; word-break: break-all; }
.cell-group-alt { background: linear-gradient(135deg, #e8f5e9, #f1f8e9); }
.cell-group-alt .cell-val { color: #2e7d32; }
.bridge-row td { background: #fff; }
.bridge-row:nth-child(4n+2) td { background: #fafcff; }
.bridge-row:nth-child(4n+3) td { background: #f5f9ff; }
.bridge-row:nth-child(4n+4) td { background: #eef6ff; }
.bridge-row:hover td { background: #e8f5e9 !important; }
.bridge-num { font-weight: 700; color: #1565c0; font-size: 0.95em; display: block; text-align: center; }
.bridge-qty { color: #e53935; font-weight: 800; font-size: 1.1em; display: block; text-align: center; }
.bridge-hours { color: #78909c; font-size: 0.82em; display: block; text-align: center; }
.bridge-eff { color: #2e7d32; font-weight: 700; font-size: 0.98em; display: block; text-align: center; }
.bridge-eff.max { color: #e53935; font-size: 1.1em; }

/* 卡片 */
.card { background: #fff; border-radius: 12px; padding: 16px; box-shadow: 0 2px 12px rgba(21, 101, 192, 0.1); border: 1px solid #d0dff0; }
.card-title { font-size: 0.95em; color: #1565c0; margin-bottom: 12px; padding-bottom: 8px; border-bottom: 2px solid #e3f2fd; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.card-title::before { content: ''; width: 4px; height: 16px; background: linear-gradient(180deg, #2196f3, #1565c0); border-radius: 2px; }
.info-grid { display: grid; gap: 12px; }
.info-item { min-width: 110px; }
.info-item label { display: block; font-size: 0.95em; color: #1565c0; margin-bottom: 4px; font-weight: 700; text-align: center; }
.time-row { background: linear-gradient(135deg, #f0f7ff 0%, #e3f2fd 100%); padding: 10px; border-radius: 8px; margin-bottom: 8px; }
.bay-row { background: linear-gradient(135deg, #fff 0%, #f5f9ff 100%); padding: 10px; border-radius: 8px; border: 1px dashed #90caf9; }
.blue-input { color: #1565c0 !important; font-weight: 700 !important; background: #f5f9ff !important; border: 2px solid #90caf9 !important; border-radius: 6px; font-size: 1.05em !important; padding: 8px 10px !important; width: 100%; }
.time-row .blue-input { font-size: 1.2em !important; padding: 8px !important; font-weight: 800 !important; }
.long-crane-bay-input { color: #e53935 !important; border-color: #ef9a9a !important; background: #fff5f5 !important; }
.blue-input:focus { border-color: #1565c0 !important; box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.12) !important; }
.auto-text { color: #1565c0; font-size: 0.9em; font-weight: 600; background: #f5f9ff; border: 2px solid #90caf9; padding: 6px 10px; border-radius: 6px; display: inline-block; width: 100%; box-sizing: border-box; text-align: center; }
.ship-input-wrapper { display: flex; justify-content: center; padding: 8px 0; }
.ship-name-input { padding: 10px 20px; background: #fff; border: 2px solid #90caf9; border-radius: 8px; font-size: 1.6em; color: #1565c0; text-align: center; font-weight: bold; letter-spacing: 4px; transition: all 0.3s; min-width: 200px; display: inline-block; width: 100%; max-width: 620px; }
.ship-name-input:focus { outline: none; border-color: #1565c0; box-shadow: 0 0 0 3px rgba(21, 101, 192, 0.15); }
.ship-name-input.warning { background: #e53935; color: #fff; border-color: #e53935; }
.table-wrapper { border: 3px solid #1565c0; border-radius: 10px; overflow: hidden; box-shadow: 0 0 0 1px rgba(21,101,192,0.2), 0 4px 16px rgba(21,101,192,0.18); }
table { width: 100%; border-collapse: collapse; }
th { background: linear-gradient(135deg, #1565c0 0%, #1976d2 100%); padding: 12px 10px; text-align: center; font-size: 0.9em; color: #fff; font-weight: 600; letter-spacing: 1px; }
td { padding: 10px 8px; text-align: center; border: 1px solid #e8eef5; font-size: 1em; background: #fff; }
tr:nth-child(even) td { background: #f8fbff; }
tr:hover td { background: #e3f2fd; }
.bridge-input { width: 80px; padding: 8px; background: #f5f9ff; border: 2px solid #90caf9; border-radius: 5px; color: #1565c0; text-align: center; font-size: 1.05em; font-weight: 700; }
.bridge-input:focus { border-color: #1565c0; outline: none; box-shadow: 0 0 0 2px rgba(21, 101, 192, 0.15); }
.bridge-cell { position: relative; }
.bridge-cell .fill-handle { position: absolute; right: 3px; bottom: 3px; width: 10px; height: 10px; background: linear-gradient(135deg, transparent 50%, #90caf9 50%); border-radius: 2px; cursor: crosshair; opacity: 0; transition: opacity 0.2s; }
.bridge-cell:hover .fill-handle { opacity: 1; }
.bridge-cell .fill-handle:hover { background: linear-gradient(135deg, transparent 50%, #1565c0 50%); }
.qc-input { width: 90px; padding: 8px; background: #fff; border: 2px solid #90caf9; border-radius: 5px; color: #1565c0; text-align: center; font-size: 1.05em; font-weight: 700; }
.qc-input:focus { border-color: #1565c0; outline: none; box-shadow: 0 0 0 2px rgba(21, 101, 192, 0.15); }
.hours-cell { color: #1565c0; font-weight: 700; font-size: 1.05em; }
.eff-cell { font-weight: 700; color: #1565c0; font-size: 1.05em; }
.eff-max { color: #e53935; font-weight: bold; }
.btn-add, .btn-remove { padding: 7px 16px; border: 2px solid #90caf9; border-radius: 6px; background: #fff; color: #1565c0; font-size: 0.9em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-export { padding: 6px 14px; border: 2px solid #4caf50; border-radius: 6px; background: #fff; color: #4caf50; font-size: 0.85em; font-weight: 600; cursor: pointer; transition: all 0.2s; }
.btn-export:hover { background: #4caf50; color: #fff; }
.btn-add:hover { background: #4caf50; border-color: #4caf50; color: #fff; }
.btn-remove:hover { background: #e53935; border-color: #e53935; color: #fff; }
.remark-input { width: 100%; min-height: 70px; padding: 10px 14px; background: #fffafafa; border: 2px solid #ef9a9a; border-radius: 6px; font-size: 1.15em; color: #c62828; font-weight: 700; font-family: 'Microsoft YaHei', Arial, sans-serif; resize: vertical; line-height: 1.5; }
.remark-input:focus { outline: none; border-color: #e53935; box-shadow: 0 0 0 2px rgba(229, 57, 53, 0.15); }
.remark-input::placeholder { color: #ef9a9a; }
tr[draggable="true"] { cursor: move; }
tr.dragging { opacity: 0.5; background: #e3f2fd !important; }
tr.drag-over td { background: #bbdefb !important; border-color: #1565c0; }
tr.fill-highlight td { background: #e3f2fd !important; border-color: #1565c0; }
tr.fill-highlight { background: #e3f2fd; }
.calc-page:only-child { margin: 0 auto; }
.pages-inner:has(.calc-page:nth-child(2)) .calc-page:first-child { margin-right: auto; }
.pages-inner:has(.calc-page:nth-child(2)) .calc-page:last-child { margin-left: auto; }
.pages-inner:has(.calc-page:nth-child(3)) .calc-page { margin: 0 auto; }

/* 深色模式 */
.dark-mode, .dark-mode body { background: #0f172a !important; min-height: 100vh; }
.dark-mode body { background-color: #0f172a !important; background-image: none !important; }
html { background: #e8eef5; }
html.dark-mode { background-color: #0f172a !important; }
.dark-mode .top-tabs { background: #1b263b; border-color: #274c5e; }
.dark-mode .group-tab { background: #16213e; border-color: #274c5e; color: #90caf9; }
.dark-mode .group-tab:hover { background: #274c5e; }
.dark-mode .group-tab.active { background: #1565c0; border-color: #1565c0; color: #fff; }
.dark-mode .stats-tab { background: #16213e; border-color: #274c5e; color: #81c784; }
.dark-mode .stats-tab:hover { background: #1b3a1f; border-color: #2e7d32; }
.dark-mode .stats-tab.active { background: #2e7d32; border-color: #2e7d32; color: #fff; }
.dark-mode .card { background: #16213e; border-color: #274c5e; }
.dark-mode .card-title { color: #64b5f6; border-bottom-color: #274c5e; }
.dark-mode .card-title::before { background: linear-gradient(180deg, #64b5f6, #2196f3); }
.dark-mode .info-item label { color: #64b5f6; }
.dark-mode .time-row { background: linear-gradient(135deg, #1b263b 0%, #16213e 100%); }
.dark-mode .bay-row { background: #1b263b; border-color: #274c5e; }
.dark-mode .blue-input { color: #90caf9 !important; background: #0d1b2a !important; border-color: #274c5e !important; }
.dark-mode .blue-input:focus { border-color: #64b5f6 !important; }
.dark-mode .auto-text { color: #90caf9; background: #0d1b2a; border-color: #274c5e; }
.dark-mode .ship-name-input { background: #0d1b2a; border-color: #274c5e; color: #90caf9; }
.dark-mode .ship-name-input:focus { border-color: #64b5f6; }
.dark-mode .ship-name-input.warning { background: #c62828; border-color: #c62828; color: #fff; }
.dark-mode .table-wrapper { border-color: #64b5f6; box-shadow: 0 0 0 1px rgba(100,181,246,0.3), 0 4px 16px rgba(0,0,0,0.4); }
.dark-mode th { background: linear-gradient(135deg, #1b263b 0%, #274c5e 100%); }
.dark-mode td { background: #16213e; border-color: #274c5e; color: #e0e0e0; }
.dark-mode tr:nth-child(even) td { background: #1b263b; }
.dark-mode tr:hover td { background: #274c5e; }
.dark-mode .bridge-input, .dark-mode .qc-input { background: #0d1b2a; border-color: #274c5e; color: #90caf9; }
.dark-mode .bridge-input:focus, .dark-mode .qc-input:focus { border-color: #64b5f6; }
.dark-mode .hours-cell, .dark-mode .eff-cell { color: #90caf9; }
.dark-mode .btn-add, .dark-mode .btn-remove { background: #1b263b; border-color: #274c5e; color: #90caf9; }
.dark-mode .btn-add:hover { background: #4caf50; border-color: #4caf50; color: #fff; }
.dark-mode .btn-remove:hover { background: #c62828; border-color: #c62828; color: #fff; }
.dark-mode .remark-input { background: #1b263b; border-color: #c62828; color: #ef5350; }
.dark-mode .remark-input:focus { border-color: #ef5350; }
.dark-mode tr.dragging { background: #274c5e !important; }
.dark-mode tr.drag-over td { background: #1e3a5f !important; border-color: #64b5f6; }
.dark-mode tr.fill-highlight td { background: #1e3a5f !important; border-color: #64b5f6; }
.dark-mode tr.fill-highlight { background: #1e3a5f; }
.dark-mode .pages-inner:has(.calc-page:only-child) .calc-page { margin: 0 auto; }
.dark-mode .pages-inner:has(.calc-page:nth-child(2)) .calc-page:first-child { margin-right: auto; }
.dark-mode .pages-inner:has(.calc-page:nth-child(2)) .calc-page:last-child { margin-left: auto; }
.dark-mode .pages-inner:has(.calc-page:nth-child(3)) .calc-page { margin: 0 auto; }
.dark-mode .page-label { color: #90caf9; }
.dark-mode .group-label { color: #ce93d8; }
.dark-mode .btn-add-page, .dark-mode .btn-remove-page { background: #6a1b9a; border-color: #6a1b9a; }
.dark-mode .btn-add-page:hover { background: #7b1fa2; }
.dark-mode .btn-remove-page:hover { background: #c62828; border-color: #c62828; }
.dark-mode .btn-remove-page:disabled { background: #37474f; border-color: #37474f; cursor: not-allowed; }
.dark-mode .stats-table-wrapper { border-color: #2e7d32; box-shadow: 0 4px 24px rgba(0,0,0,0.4); }
.dark-mode .stats-table th { background: linear-gradient(135deg, #1b3a1f 0%, #2e7d32 100%); border-bottom-color: #1b5e20; }
.dark-mode .stats-table td { background: #16213e; border-color: #274c5e; }
.dark-mode .cell-group { background: linear-gradient(135deg, #1b263b, #16213e); }
.dark-mode .cell-group .cell-val { color: #90caf9; }
.dark-mode .cell-group .cell-sub { color: #90caf9; opacity: 0.7; }
.dark-mode .cell-group-alt { background: linear-gradient(135deg, #1b3a1f, #16213e); }
.dark-mode .cell-group-alt .cell-val { color: #81c784; }
.dark-mode .cell-remark { background: linear-gradient(135deg, #1b263b, #16213e); }
.dark-mode .cell-remark .remark-text { color: #ef5350; }
.dark-mode .bridge-row td { background: #16213e; }
.dark-mode .bridge-row:nth-child(4n+2) td { background: #1b263b; }
.dark-mode .bridge-row:nth-child(4n+3) td { background: #1f2f45; }
.dark-mode .bridge-row:nth-child(4n+4) td { background: #16213e; }
.dark-mode .bridge-row:hover td { background: #1b3a1f !important; }
.dark-mode .bridge-num { color: #90caf9; }
.dark-mode .bridge-qty { color: #ef5350; }
.dark-mode .bridge-hours { color: #78909c; }
.dark-mode .bridge-eff { color: #81c784; }
.dark-mode .bridge-eff.max { color: #ef5350; }
.dark-mode .stats-title { color: #81c784; }
.dark-mode .stats-subtitle { color: #4caf50; }
.dark-mode .stats-summary { background: linear-gradient(135deg, #1b263b, #16213e); box-shadow: 0 2px 12px rgba(0,0,0,0.3); }
.dark-mode .stats-summary-item { background: #16213e; border-color: #274c5e; color: #90caf9; }
.dark-mode .btn-export-stats { border-color: #2e7d32; color: #81c784; box-shadow: 0 2px 8px rgba(0,0,0,0.3); }
.dark-mode .btn-export-stats:hover { background: #2e7d32; color: #fff; }
.dark-mode .sync-status-bar { background: linear-gradient(135deg, #0d1b2a, #1b263b); border-bottom: 1px solid #274c5e; }

.theme-toggle { background: rgba(255,255,255,0.15); border: 1px solid rgba(255,255,255,0.3); border-radius: 20px; padding: 6px 14px; color: #fff; font-size: 0.85em; cursor: pointer; transition: all 0.3s; margin-left: 10px; }
.theme-toggle:hover { background: rgba(255,255,255,0.25); }
.dark-mode .theme-toggle { background: rgba(0,0,0,0.3); border-color: rgba(255,255,255,0.2); }
</style>
</head>
<body>

<!-- 同步状态栏 -->
<div class="sync-status-bar" id="syncStatusBar">
  <div class="status-left">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">单机模式</span>
  </div>
  <div class="status-right">
    <span class="online-count" id="onlineCount" style="display:none">在线：1</span>
    <button class="sync-btn" id="btnStartServer" onclick="startServer()">🚀 启动服务器</button>
    <button class="sync-btn" id="btnConnect" onclick="showConnectDialog()">🔗 连接</button>
    <button class="sync-btn" id="btnDisconnect" onclick="disconnect()" style="display:none">断开</button>
  </div>
</div>

<div class="header">
  <div style="display: flex; justify-content: center; align-items: center;">
    <h1>NICT 吊数计算器 V1.6</h1>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙 深色</button>
  </div>
</div>

<div class="top-tabs">
  <div id="groupTabsWrap" style="display:flex; flex-wrap:wrap; gap:6px;"></div>
  <button class="stats-tab" id="statsTab" onclick="switchToStats()">📊 统计</button>
</div>

<div class="calc-view" id="calcView">
  <div class="page-control">
    <span class="group-label" id="groupLabel">一组</span>
    <div class="page-label" id="pageLabel">第 1 页</div>
    <button class="btn-add-page" id="btnAddPage">➕ 新增页面</button>

<!-- 连接对话框 -->
<div id="connectDialog" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:9999;justify-content:center;align-items:center;">
  <div style="background:#fff;border-radius:16px;padding:32px;max-width:400px;width:90%;box-shadow:0 8px 32px rgba(0,0,0,0.3);">
    <h3 style="color:#1565c0;margin-bottom:16px;text-align:center;">🔗 连接到同步服务器</h3>
    <div style="margin-bottom:16px;">
      <label style="display:block;color:#1565c0;font-weight:700;margin-bottom:6px;">服务器地址</label>
      <input type="text" id="serverAddrInput" placeholder="例如：192.168.1.100:8765" style="width:100%;padding:10px;border:2px solid #90caf9;border-radius:8px;font-size:1em;color:#1565c0;font-weight:600;box-sizing:border-box;">
    </div>
    <div style="display:flex;gap:12px;justify-content:center;">
      <button onclick="doConnect()" style="padding:10px 24px;background:#1565c0;color:#fff;border:none;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;">连接</button>
      <button onclick="hideConnectDialog()" style="padding:10px 24px;background:#ccc;color:#333;border:none;border-radius:8px;font-size:1em;font-weight:700;cursor:pointer;">取消</button>
    </div>
  </div>
</div>

<script>
// ================================================================
// Electron 同步系统
// ================================================================
let ws = null;
let isServerRunning = false;
let reconnectTimer = null;
let myClientId = 'client_' + Math.random().toString(36).substr(2, 8);
let serverMode = false;
let currentServerAddr = '';

// 检查是否在 Electron 环境中
const isElectron = typeof window.electronAPI !== 'undefined';

// 更新连接状态
function updateSyncStatus(status, msg, onlineNum) {
  const dot = document.getElementById('statusDot');
  const text = document.getElementById('statusText');
  const onlineEl = document.getElementById('onlineCount');
  const btnServer = document.getElementById('btnStartServer');
  const btnConnect = document.getElementById('btnConnect');
  const btnDisconnect = document.getElementById('btnDisconnect');

  dot.className = 'status-dot';
  if (status === 'connected' || status === 'server') {
    dot.classList.add('connected');
    btnServer.style.display = 'none';
    btnConnect.style.display = 'none';
    btnDisconnect.style.display = 'inline-block';
    onlineEl.style.display = 'inline-block';
    if (onlineNum !== undefined) {
      onlineEl.textContent = '在线：' + onlineNum;
    }
  } else {
    btnServer.style.display = 'inline-block';
    btnConnect.style.display = 'inline-block';
    btnDisconnect.style.display = 'none';
    onlineEl.style.display = 'none';
  }
  if (text) text.textContent = msg;
}

function showConnectDialog() {
  document.getElementById('connectDialog').style.display = 'flex';
  document.getElementById('serverAddrInput').focus();
}

function hideConnectDialog() {
  document.getElementById('connectDialog').style.display = 'none';
}

async function startServer() {
  const port = 8765;

  if (isElectron) {
    // Electron 模式：调用主进程启动 WebSocket 服务器
    window.electronAPI.startServer(port);
  }

  // 获取本机 IP
  let lanIp = '127.0.0.1';
  if (isElectron) {
    lanIp = await window.electronAPI.getLocalIP();
  }

  isServerRunning = true;
  serverMode = true;
  updateSyncStatus('server', `服务器模式（端口 ${port}）`, 1);

  alert(`服务器已启动！\n\n其他电脑连接地址：\n${lanIp}:${port}\n\n（请确保防火墙允许 ${port} 端口）`);
}

function doConnect() {
  const addr = document.getElementById('serverAddrInput').value.trim();
  if (!addr) { alert('请输入服务器地址'); return; }

  let fullAddr = addr;
  if (!addr.includes(':')) fullAddr = addr + ':8765';

  hideConnectDialog();
  updateSyncStatus('connecting', '连接中...');
  currentServerAddr = fullAddr;
  connectToServer('ws://' + fullAddr);
}

function connectToServer(url) {
  try {
    ws = new WebSocket(url);

    ws.onopen = () => {
      updateSyncStatus('connected', '已连接', 2);
      sendSync({ type: 'request_full_sync' });
    };

    ws.onmessage = (event) => {
      try {
        const msg = JSON.parse(event.data);
        handleSyncMessage(msg);
      } catch(e) {}
    };

    ws.onclose = () => {
      updateSyncStatus('offline', '连接已断开');
      ws = null;
      if (reconnectTimer) clearTimeout(reconnectTimer);
      reconnectTimer = setTimeout(() => {
        if (currentServerAddr) connectToServer('ws://' + currentServerAddr);
      }, 3000);
    };

    ws.onerror = () => {
      updateSyncStatus('offline', '连接失败');
    };
  } catch(e) {
    updateSyncStatus('offline', '连接失败：' + e.message);
  }
}

function disconnect() {
  if (ws) { ws.close(); ws = null; }
  if (reconnectTimer) { clearTimeout(reconnectTimer); reconnectTimer = null; }
  isServerRunning = false;
  serverMode = false;
  currentServerAddr = '';
  updateSyncStatus('offline', '单机模式');
}

function sendSync(data) {
  if (isElectron && serverMode && isServerRunning) {
    // 作为服务器时，通过主进程广播
    window.electronAPI.broadcastData(getLocalData());
  } else if (ws && ws.readyState === WebSocket.OPEN) {
    ws.send(JSON.stringify({ ...data, from: myClientId }));
  }
}

function handleSyncMessage(msg) {
  if (msg.type === 'full_sync') {
    if (msg.data) applyRemoteData(msg.data);
    if (msg.clients) updateSyncStatus('connected', '已连接', msg.clients);
  } else if (msg.type === 'data_update') {
    if (msg.data) applyRemoteData(msg.data, true);
    if (msg.clients) updateSyncStatus('connected', '已连接', msg.clients);
  } else if (msg.type === 'request_full_sync') {
    if (isServerRunning) {
      // Electron 服务器模式通过 IPC 广播
      window.electronAPI.broadcastData(getLocalData());
    }
  } else if (msg.type === 'client_count') {
    if (msg.count) updateSyncStatus('connected', '已连接', msg.count);
  }
}

function getLocalData() {
  return { groupData, currentGroup, version: '1.6' };
}

function applyRemoteData(data, incremental) {
  if (!data) return;
  if (data.groupData) {
    for (let gi = 0; gi < MAX_GROUPS; gi++) {
      if (data.groupData[gi]) {
        groupData[gi] = data.groupData[gi];
      }
    }
  }
  if (data.currentGroup !== undefined) {
    currentGroup = data.currentGroup;
  }
  renderGroupTabs();
  document.getElementById('groupLabel').textContent = GROUP_NAMES[currentGroup];
  renderAllPages();
  updatePageLabel();
  if (currentView === 'stats') renderStatsTable();
}

// 监听 Electron 主进程消息
if (isElectron) {
  window.electronAPI.onClientCount((count) => {
    if (isServerRunning) {
      updateSyncStatus('server', `服务器模式（端口 8765）`, count);
    }
  });
}

// ================================================================
// 数据结构
// ================================================================
const GROUP_NAMES = ['一组','二组','三组','四组','五组','六组','七组','八组','九组'];
const MAX_GROUPS = 9;

let groupData = [];
let currentGroup = 0;
let currentView = 'calc';

for (let gi = 0; gi < MAX_GROUPS; gi++) {
  groupData[gi] = { pages: [], pageCount: 0 };
}

// ================================================================
// 视图切换
// ================================================================
function switchToStats() {
  currentView = 'stats';
  document.getElementById('calcView').classList.add('hidden');
  document.getElementById('statsView').classList.add('visible');
  document.getElementById('statsTab').classList.add('active');
  renderGroupTabs();
  renderStatsTable();
}

function switchToCalc() {
  currentView = 'calc';
  document.getElementById('calcView').classList.remove('hidden');
  document.getElementById('statsView').classList.remove('visible');
  document.getElementById('statsTab').classList.remove('active');
  renderGroupTabs();
}

function renderGroupTabs() {
  const container = document.getElementById('groupTabsWrap');
  container.innerHTML = '';
  for (let gi = 0; gi < MAX_GROUPS; gi++) {
    const btn = document.createElement('button');
    btn.className = 'group-tab' + (currentView === 'calc' && gi === currentGroup ? ' active' : '');
    btn.textContent = GROUP_NAMES[gi];
    btn.onclick = () => { switchToCalc(); switchGroup(gi); };
    container.appendChild(btn);
  }
}

function switchGroup(gi) {
  currentGroup = gi;
  renderGroupTabs();
  document.getElementById('groupLabel').textContent = GROUP_NAMES[gi];
  renderAllPages();
  updatePageLabel();
  broadcastUpdate();
}

// ================================================================
// 页数据
// ================================================================
function initPageData(gi, pi, copyFromPi = null) {
  if (!groupData[gi].pages[pi]) {
    const now = new Date();
    const later = new Date(now.getTime() + 4 * 3600000);
    const fmt = (d) => d.toISOString().slice(0, 16);
    groupData[gi].pages[pi] = {
      shipName: '', estCompletionTime: fmt(later),
      departureTime: fmt(new Date(later.getTime() + 2 * 3600000)),
      naturalBay: '22-26', longCraneBay: '22-32',
      qcData: [
        {bridge:'QC01', qc:78}, {bridge:'QC02', qc:120}, {bridge:'QC03', qc:96},
        {bridge:'QC04', qc:20}, {bridge:'QC05', qc:50}, {bridge:'QC06', qc:59},
        {bridge:'QC07', qc:6}, {bridge:'QC08', qc:98},
      ], remark: ''
    };
  }
  if (copyFromPi !== null && groupData[gi].pages[copyFromPi]) {
    groupData[gi].pages[pi] = JSON.parse(JSON.stringify(groupData[gi].pages[copyFromPi]));
  }
}

function savePageData(gi, pi) {
  const d = groupData[gi].pages[pi];
  if (!d) return;
  d.shipName = document.getElementById(`shipName_${gi}_${pi}`).value;
  d.estCompletionTime = document.getElementById(`estCompletionTime_${gi}_${pi}`).value;
  d.departureTime = document.getElementById(`departureTime_${gi}_${pi}`).value;
  d.naturalBay = document.getElementById(`naturalBay_${gi}_${pi}`).value;
  d.longCraneBay = document.getElementById(`longCraneBay_${gi}_${pi}`).value;
  d.remark = document.getElementById(`remarkInput_${gi}_${pi}`).value;
  sessionStorage.setItem(`nictCalc_g${gi}_p${pi}`, JSON.stringify(d));
  if (currentView === 'stats') renderStatsTable();
  broadcastUpdate();
}

function broadcastUpdate() {
  sendSync({ type: 'data_update', data: getLocalData() });
}

function calcWorkHours(gi, pi) {
  const el = document.getElementById(`estCompletionTime_${gi}_${pi}`);
  if (!el || !el.value) return 0;
  const estCompletion = new Date(el.value);
  const now = new Date();
  if (isNaN(estCompletion)) return 0;
  return Math.max(0, (estCompletion - now) / 3600000);
}

function getWorkHoursFromEst(estCompletionTime) {
  if (!estCompletionTime) return 0;
  const est = new Date(estCompletionTime);
  const now = new Date();
  if (isNaN(est)) return 0;
  return Math.max(0, (est - now) / 3600000);
}

function fmtTime(t) {
  if (!t) return '-';
  return new Date(t).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

function fmtFullTime(t) {
  if (!t) return '-';
  return new Date(t).toLocaleString('zh-CN', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
}

// ================================================================
// 页面HTML
// ================================================================
function getPageHtml(gi, pi) {
  const d = groupData[gi].pages[pi];
  if (!d) return '';
  return `<div class="card">
    <div class="card-title">船名</div>
    <div class="ship-input-wrapper">
      <input type="text" class="ship-name-input" id="shipName_${gi}_${pi}" value="${d.shipName || ''}" placeholder="请输入船名">
    </div>
  </div>
  <div class="card">
    <div class="card-title">基本信息</div>
    <div class="info-grid time-row" style="grid-template-columns: repeat(3, 1fr);">
      <div class="info-item"><label>当前时间</label><div class="auto-text" id="currentTimeDisplay_${gi}_${pi}"></div></div>
      <div class="info-item"><label>预完时间</label><input type="datetime-local" class="blue-input" id="estCompletionTime_${gi}_${pi}" value="${d.estCompletionTime || ''}"></div>
      <div class="info-item"><label>离泊时间</label><input type="datetime-local" class="blue-input" id="departureTime_${gi}_${pi}" value="${d.departureTime || ''}"></div>
    </div>
    <div class="info-grid bay-row" style="grid-template-columns: repeat(2, 1fr);">
      <div class="info-item"><label>自然长京贝</label><input type="text" class="blue-input" id="naturalBay_${gi}_${pi}" value="${d.naturalBay || '22-26'}"></div>
      <div class="info-item"><label>长京桥作业贝</label><input type="text" class="blue-input long-crane-bay-input" id="longCraneBay_${gi}_${pi}" value="${d.longCraneBay || '22-32'}"></div>
    </div>
  </div>
  <div class="card">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <div class="card-title" style="margin-bottom:0;">实时卡</div>
      <div style="display:flex; gap:8px;">
        <button class="btn-add" onclick="addRow(${gi},${pi})">+ 添加</button>
        <button class="btn-remove" onclick="removeRow(${gi},${pi})">− 删除</button>
        <button class="btn-export" onclick="exportToExcel(${gi},${pi})">📥 导出</button>
      </div>
    </div>
    <div class="table-wrapper">
      <table id="qcTable_${gi}_${pi}">
        <thead><tr><th>岸桥</th><th>吊数</th><th>作业时长</th><th>效率</th></tr></thead>
        <tbody id="qcBody_${gi}_${pi}"></tbody>
      </table>
    </div>
  </div>
  <div class="card">
    <div class="card-title">备注</div>
    <textarea class="remark-input" id="remarkInput_${gi}_${pi}" placeholder="请输入备注...">${d.remark || ''}</textarea>
  </div>`;
}

function renderTable(gi, pi) {
  const tbody = document.getElementById(`qcBody_${gi}_${pi}`);
  const d = groupData[gi].pages[pi];
  if (!d || !tbody) return;
  tbody.innerHTML = '';
  const rowCount = d.qcData.length;

  for (let i = 0; i < rowCount; i++) {
    const bridgeVal = d.qcData[i] ? d.qcData[i].bridge : `QC${(i+1).toString().padStart(2,'0')}`;
    const qcVal = d.qcData[i] ? d.qcData[i].qc : 0;
    const tr = document.createElement('tr');
    tr.setAttribute('draggable', 'true');
    tr.setAttribute('data-group', gi);
    tr.setAttribute('data-page', pi);
    tr.setAttribute('data-index', i);
    tr.innerHTML = `
      <td class="bridge-cell"><input type="text" class="bridge-input" id="bridge_${gi}_${pi}_${i}" value="${bridgeVal}"><div class="fill-handle" data-group="${gi}" data-page="${pi}" data-row="${i}"></div></td>
      <td><input type="number" class="qc-input" id="qc_${gi}_${pi}_${i}" value="${qcVal}" min="0"></td>
      <td id="hours_${gi}_${pi}_${i}" class="hours-cell">-</td>
      <td id="eff_${gi}_${pi}_${i}" class="eff-cell">-</td>`;
    tbody.appendChild(tr);
    tr.addEventListener('dragstart', handleDragStart);
    tr.addEventListener('dragover', handleDragOver);
    tr.addEventListener('drop', handleDrop);
    tr.addEventListener('dragend', handleDragEnd);

    const bridgeInput = document.getElementById(`bridge_${gi}_${pi}_${i}`);
    bridgeInput.addEventListener('input', e => {
      let val = e.target.value.replace(/[^0-9]/g, '');
      if (val) val = 'QC' + val;
      groupData[gi].pages[pi].qcData[i].bridge = val;
      e.target.value = val;
      savePageData(gi, pi);
    });
    bridgeInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); const ni = document.getElementById(`bridge_${gi}_${pi}_${(i+1)%rowCount}`); ni&&(ni.focus(),ni.select()); }
    });

    const qcInput = document.getElementById(`qc_${gi}_${pi}_${i}`);
    qcInput.addEventListener('input', e => { groupData[gi].pages[pi].qcData[i].qc = parseFloat(e.target.value)||0; calculate(gi,pi); savePageData(gi,pi); });
    qcInput.addEventListener('keydown', e => {
      if (e.key === 'Enter') { e.preventDefault(); const ni = document.getElementById(`qc_${gi}_${pi}_${(i+1)%rowCount}`); ni&&(ni.focus(),ni.select()); }
    });
  }
  calculate(gi, pi);
}

function calculate(gi, pi) {
  const workHours = calcWorkHours(gi, pi);
  const shipInput = document.getElementById(`shipName_${gi}_${pi}`);
  if (shipInput) { if (workHours>0 && workHours<3) shipInput.classList.add('warning'); else shipInput.classList.remove('warning'); }
  const d = groupData[gi].pages[pi];
  if (!d) return;
  const rowCount = d.qcData.length;
  let maxEff = -1, effs = [];
  for (let i = 0; i < rowCount; i++) {
    const qcVal = d.qcData[i] ? (parseFloat(document.getElementById(`qc_${gi}_${pi}_${i}`).value)||0) : 0;
    const hel = document.getElementById(`hours_${gi}_${pi}_${i}`);
    if (hel) hel.textContent = workHours.toFixed(1);
    const eff = workHours>0 ? qcVal/workHours : 0; effs.push(eff);
    if (eff>maxEff) maxEff=eff;
  }
  for (let i = 0; i < rowCount; i++) {
    const qcVal = d.qcData[i] ? (parseFloat(document.getElementById(`qc_${gi}_${pi}_${i}`).value)||0) : 0;
    const eff = workHours>0 ? qcVal/workHours : 0;
    const effCell = document.getElementById(`eff_${gi}_${pi}_${i}`);
    if (effCell) { effCell.textContent = eff.toFixed(1); effCell.classList.remove('eff-max'); if (effs[i]>0&&effs[i]===maxEff) effCell.classList.add('eff-max'); }
  }
}

function updateClock(gi, pi) {
  const now = new Date();
  const fmt = now.toLocaleString('zh-CN',{year:'numeric',month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit',second:'2-digit',hour12:false});
  const el = document.getElementById(`currentTimeDisplay_${gi}_${pi}`);
  if (el) el.textContent = fmt;
}

// ================================================================
// 拖拽
// ================================================================
let draggedIndex=null, draggedGroupIdx=null, draggedPageIdx=null;
function handleDragStart(e) { if(isFilling){e.preventDefault();return;} draggedGroupIdx=parseInt(e.currentTarget.getAttribute('data-group')); draggedPageIdx=parseInt(e.currentTarget.getAttribute('data-page')); draggedIndex=parseInt(e.currentTarget.getAttribute('data-index')); e.currentTarget.classList.add('dragging'); e.dataTransfer.effectAllowed='move'; }
function handleDragOver(e){e.preventDefault();e.dataTransfer.dropEffect='move';e.currentTarget.classList.add('drag-over');}
function handleDrop(e){e.preventDefault();const tg=parseInt(e.currentTarget.getAttribute('data-group')),tp=parseInt(e.currentTarget.getAttribute('data-page')),ti=parseInt(e.currentTarget.getAttribute('data-index')); if(draggedIndex!==null&&draggedIndex!==ti&&draggedGroupIdx===tg&&draggedPageIdx===tp){const temp=groupData[draggedGroupIdx].pages[draggedPageIdx].qcData[draggedIndex];groupData[draggedGroupIdx].pages[draggedPageIdx].qcData.splice(draggedIndex,1);groupData[draggedGroupIdx].pages[draggedPageIdx].qcData.splice(ti,0,temp);renderTable(draggedGroupIdx,draggedPageIdx);savePageData(draggedGroupIdx,draggedPageIdx);}}
function handleDragEnd(e){e.currentTarget.classList.remove('dragging');document.querySelectorAll('tr').forEach(row=>row.classList.remove('drag-over'));draggedIndex=null;draggedGroupIdx=null;draggedPageIdx=null;}

// ================================================================
// 填充手柄
// ================================================================
let isFilling=false,fillStartRow=0,fillStartGroup=0,fillStartPage=0,lastTargetRow=-1,originalBridges={};
function initFillHandle(){
  const c=document.getElementById('pageContainer');
  c.addEventListener('mousedown',e=>{const h=e.target.closest('.fill-handle');if(!h)return;e.preventDefault();e.stopPropagation();isFilling=true;fillStartGroup=parseInt(h.getAttribute('data-group'));fillStartPage=parseInt(h.getAttribute('data-page'));fillStartRow=parseInt(h.getAttribute('data-row'));lastTargetRow=fillStartRow;originalBridges={};document.body.style.cursor='crosshair';});
  c.addEventListener('mouseover',e=>{if(!isFilling)return;const tr=e.target.closest('tr');if(!tr)return;const ti=parseInt(tr.getAttribute('data-index'));if(ti!==lastTargetRow){handleFill(ti);lastTargetRow=ti;}});
  document.addEventListener('mouseup',()=>{if(isFilling){isFilling=false;document.body.style.cursor='';clearFillHighlight();}});
}
function handleFill(targetRow){
  if(targetRow>fillStartRow){
    const sb=groupData[fillStartGroup].pages[fillStartPage].qcData[fillStartRow].bridge,match=sb.match(/^QC(\d+)$/);if(!match)return;const sn=parseInt(match[1]);
    for(let i=fillStartRow+1;i<=targetRow;i++){if(originalBridges[i]===undefined)originalBridges[i]=groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge;groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge='QC'+(sn+(i-fillStartRow)).toString().padStart(2,'0');const inp=document.getElementById(`bridge_${fillStartGroup}_${fillStartPage}_${i}`);if(inp)inp.value=groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge;}
    for(let i=targetRow+1;i<groupData[fillStartGroup].pages[fillStartPage].qcData.length;i++){if(originalBridges[i]!==undefined){groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge=originalBridges[i];const inp=document.getElementById(`bridge_${fillStartGroup}_${fillStartPage}_${i}`);if(inp)inp.value=groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge;delete originalBridges[i];}}
  }else if(targetRow<fillStartRow){
    for(let i=targetRow+1;i<groupData[fillStartGroup].pages[fillStartPage].qcData.length;i++){if(originalBridges[i]!==undefined){groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge=originalBridges[i];const inp=document.getElementById(`bridge_${fillStartGroup}_${fillStartPage}_${i}`);if(inp)inp.value=groupData[fillStartGroup].pages[fillStartPage].qcData[i].bridge;delete originalBridges[i];}}
  }
  for(let i=Math.min(fillStartRow,targetRow)+1;i<=Math.max(fillStartRow,targetRow);i++){const tr=document.querySelector(`#qcBody_${fillStartGroup}_${fillStartPage} tr[data-index="${i}"]`);if(tr)tr.classList.add('fill-highlight');}
  savePageData(fillStartGroup,fillStartPage);
}
function clearFillHighlight(){document.querySelectorAll('tr').forEach(row=>row.classList.remove('fill-highlight'));}

// ================================================================
// 主题
// ================================================================
function toggleTheme(){document.documentElement.classList.toggle('dark-mode');document.body.classList.toggle('dark-mode');const isDark=document.documentElement.classList.contains('dark-mode');document.getElementById('themeToggle').textContent=isDark?'☀️ 浅色':'🌙 深色';localStorage.setItem('nictTheme',isDark?'dark':'light');}
function loadTheme(){if(localStorage.getItem('nictTheme')==='dark'){document.documentElement.classList.add('dark-mode');document.body.classList.add('dark-mode');document.getElementById('themeToggle').textContent='☀️ 浅色';}}

// ================================================================
// 导出
// ================================================================
function exportToExcel(gi,pi){
  const d=groupData[gi].pages[pi];if(!d)return;
  const sn=d.shipName||'未填船名',wh=calcWorkHours(gi,pi),gn=GROUP_NAMES[gi];
  const data=[[`NICT 吊数计算器 - ${gn} 第${pi+1}页`],['船名',sn],['预完时间',d.estCompletionTime],['离泊时间',d.departureTime],['自然长京贝',d.naturalBay],['长京桥作业贝',d.longCraneBay],['作业时长（时）',wh.toFixed(1)],[],['实时卡数据'],['岸桥','吊数','作业时长（时）','效率（吊/时）']];
  for(let i=0;i<d.qcData.length;i++){const qc=d.qcData[i]?d.qcData[i].qc:0;data.push([d.qcData[i]?d.qcData[i].bridge:'',qc,wh.toFixed(1),wh>0?(qc/wh).toFixed(1):'0.0']);}
  if(d.remark){data.push([]);data.push(['备注',d.remark]);}
  const ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,`${gn}第${pi+1}页`);const now=new Date(),ds=now.toLocaleDateString('zh-CN').replace(/\//g,'-'),ts=now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(/:/g,'-');XLSX.writeFile(wb,`${sn}_${gn}_${ds}_${ts}_p${pi+1}.xlsx`);
}

function addRow(gi,pi){initPageData(gi,pi);groupData[gi].pages[pi].qcData.push({bridge:`QC${(groupData[gi].pages[pi].qcData.length+1).toString().padStart(2,'0')}`,qc:0});renderTable(gi,pi);savePageData(gi,pi);}
function removeRow(gi,pi){initPageData(gi,pi);if(groupData[gi].pages[pi].qcData.length>1){groupData[gi].pages[pi].qcData.pop();renderTable(gi,pi);savePageData(gi,pi);}}

// ================================================================
// 创建页面
// ================================================================
function createPage(gi,pi,copyFromPi=null){
  initPageData(gi,pi,copyFromPi);
  const wrapper=document.createElement('div');wrapper.className='calc-page';wrapper.id=`calc-page-${gi}-${pi}`;wrapper.innerHTML=getPageHtml(gi,pi);document.getElementById('pageContainer').appendChild(wrapper);
  ['shipName','estCompletionTime','departureTime','naturalBay','longCraneBay','remarkInput'].forEach(id=>{const el=document.getElementById(`${id}_${gi}_${pi}`);if(!el)return;el.addEventListener('input',()=>{savePageData(gi,pi);if(id==='shipName')updateWindowTitle(gi,pi);});el.addEventListener('change',()=>{savePageData(gi,pi);calculate(gi,pi);});});
  renderTable(gi,pi);
  const key=`clockInterval_g${gi}_p${pi}`;if(!window[key]){window[key]=setInterval(()=>{updateClock(gi,pi);calculate(gi,pi);},1000);}
  updateClock(gi,pi);
}

function updateWindowTitle(gi,pi){const el=document.getElementById(`shipName_${gi}_${pi}`);if(!el)return;document.title=el.value.trim()?`🚢${GROUP_NAMES[gi]}｜${el.value.trim()}`:'NICT 吊数计算器 V1.6';}

function renderAllPages(){
  const container=document.getElementById('pageContainer');container.innerHTML='';
  Object.keys(window).forEach(k=>{if(k.startsWith('clockInterval_g')){clearInterval(window[k]);delete window[k];}});
  const gd=groupData[currentGroup];for(let pi=0;pi<gd.pageCount;pi++){createPage(currentGroup,pi);}
}

function updatePageLabel(){const count=groupData[currentGroup].pageCount;document.getElementById('pageLabel').textContent=`共 ${count} 页`;document.getElementById('btnRemovePage').disabled=count<=1;}

document.getElementById('btnAddPage').addEventListener('click',()=>{const gd=groupData[currentGroup];createPage(currentGroup,gd.pageCount,gd.pageCount>0?0:null);gd.pageCount++;updatePageLabel();broadcastUpdate();});

document.getElementById('btnRemovePage').addEventListener('click',()=>{
  const gd=groupData[currentGroup];if(gd.pageCount<=1)return;
  const lastPi=gd.pageCount-1,wrapper=document.getElementById(`calc-page-${currentGroup}-${lastPi}`);if(wrapper)wrapper.remove();
  delete gd.pages[lastPi];sessionStorage.removeItem(`nictCalc_g${currentGroup}_p${lastPi}`);
  const key=`clockInterval_g${currentGroup}_p${lastPi}`;if(window[key]){clearInterval(window[key]);delete window[key];}
  gd.pageCount--;updatePageLabel();if(currentView==='stats')renderStatsTable();broadcastUpdate();
});

// ================================================================
// 统计视图
// ================================================================
function renderStatsTable(){
  const now=new Date();const tbody=document.getElementById('statsBody');const summaryEl=document.getElementById('statsSummary');
  tbody.innerHTML='';
  let allShips=[],overdueCount=0;
  for(let gi=0;gi<MAX_GROUPS;gi++){const gd=groupData[gi];for(let pi=0;pi<gd.pageCount;pi++){const d=gd.pages[pi];if(!d)continue;if(d.estCompletionTime&&new Date(d.estCompletionTime)<now){overdueCount++;continue;}allShips.push({gi,pi,d});}}

  summaryEl.innerHTML=`
    <span class="stats-summary-item">🚢 船舶总数：${allShips.length+overdueCount}</span>
    <span class="stats-summary-item">⏱️ 预完时间内：${allShips.length}</span>
    <span class="stats-summary-item">⏰ 已超时：${overdueCount}</span>`;

  if(allShips.length===0){tbody.innerHTML=`<tr><td colspan="9" style="text-align:center;padding:50px;color:#90caf9;font-size:1.1em;">暂无预完时间内的船舶记录</td></tr>`;return;}

  let globalMaxEff=-1;
  for(const ship of allShips){const wh=getWorkHoursFromEst(ship.d.estCompletionTime);for(const q of(ship.d.qcData||[])){const eff=wh>0?(parseFloat(q?.qc)||0)/wh:0;if(eff>globalMaxEff)globalMaxEff=eff;}}

  for(const ship of allShips){
    const {gi,d}=ship;const wh=getWorkHoursFromEst(d.estCompletionTime);const bridges=d.qcData||[];const bc=bridges.length;

    for(let b=0;b<Math.max(bc,1);b++){
      const q=bridges[b];const bridgeNum=q?q.bridge:`QC${(b+1).toString().padStart(2,'0')}`;const qcVal=q?(parseFloat(q.qc)||0):0;const eff=wh>0?qcVal/wh:0;const isMax=eff>0&&eff===globalMaxEff;
      const tr=document.createElement('tr');tr.className='bridge-row';

      let groupCell='';if(b===0)groupCell=`<td rowspan="${Math.max(bc,1)}" style="background:linear-gradient(135deg,#1565c0,#1976d2);color:#fff;font-weight:800;font-size:1em;text-align:center;vertical-align:middle;letter-spacing:2px;border-right:2px solid #0d47a1;">${GROUP_NAMES[gi]}</td>`;
      let shipCell='';if(b===0)shipCell=`<td rowspan="${Math.max(bc,1)}" class="cell-group" style="border-right:2px solid #bbdefb;"><span class="cell-val">${d.shipName||'（未填船名）'}</span></td>`;
      let estCell='';if(b===0)estCell=`<td rowspan="${Math.max(bc,1)}" class="cell-group-alt" style="border-right:2px solid #c8e6c9;"><span class="cell-val" style="color:#2e7d32;">${fmtFullTime(d.estCompletionTime)}</span><span class="cell-sub">预完</span></td>`;
      let depCell='';if(b===0)depCell=`<td rowspan="${Math.max(bc,1)}" class="cell-group-alt" style="border-right:2px solid #c8e6c9;"><span class="cell-val" style="color:#2e7d32;">${fmtFullTime(d.departureTime)}</span><span class="cell-sub">离泊</span></td>`;
      let remCell='';if(b===0)remCell=`<td rowspan="${Math.max(bc,1)}" class="cell-remark" style="border-right:2px solid #ffcdd2;"><span class="remark-text">${d.remark||'-'}</span></td>`;

      tr.innerHTML=`${groupCell}${shipCell}${estCell}${depCell}<td><span class="bridge-num">${bridgeNum}</span></td><td><span class="bridge-qty">${qcVal||'-'}</span></td><td><span class="bridge-hours">${wh.toFixed(1)}h</span></td><td><span class="bridge-eff${isMax?' max':''}">${wh>0?eff.toFixed(1):'-'}</span></td>${remCell}`;
      tbody.appendChild(tr);
    }
  }
}

// ================================================================
// 导出统计
// ================================================================
function exportStatsToExcel(){
  const now=new Date();const ships=[];
  for(let gi=0;gi<MAX_GROUPS;gi++){const gd=groupData[gi];for(let pi=0;pi<gd.pageCount;pi++){const d=gd.pages[pi];if(!d)continue;if(d.estCompletionTime&&new Date(d.estCompletionTime)<now)continue;ships.push({gi,d});}}

  const data=[['NICT 船舶作业统计报表'],['导出时间',now.toLocaleString('zh-CN')],[],['组别','船名','预完时间','离泊','岸桥号','吊数','作业时长','效率','备注']];

  let globalMaxEff=-1;
  for(const s of ships){const wh=getWorkHoursFromEst(s.d.estCompletionTime);for(const q of(s.d.qcData||[])){const eff=wh>0?(parseFloat(q?.qc)||0)/wh:0;if(eff>globalMaxEff)globalMaxEff=eff;}}

  for(const ship of ships){
    const {gi,d}=ship;const wh=getWorkHoursFromEst(d.estCompletionTime);const bridges=d.qcData||[];
    for(let b=0;b<Math.max(bridges.length,1);b++){
      const q=bridges[b];const qcVal=q?(parseFloat(q.qc)||0):0;const eff=wh>0?qcVal/wh:0;
      data.push([b===0?GROUP_NAMES[gi]:'',b===0?(d.shipName||'（未填船名）'):'',b===0?fmtFullTime(d.estCompletionTime):'',b===0?fmtFullTime(d.departureTime):'',q?q.bridge:'',qcVal||'',wh.toFixed(1),wh>0?eff.toFixed(1):'',b===0?(d.remark||''):'']);
    }
  }

  const ws=XLSX.utils.aoa_to_sheet(data),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'船舶统计');
  const ds=now.toLocaleDateString('zh-CN').replace(/\//g,'-'),ts=now.toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit',second:'2-digit'}).replace(/:/g,'-');
  XLSX.writeFile(wb,`船舶统计报表_${ds}_${ts}.xlsx`);
}

// ================================================================
// 恢复
// ================================================================
function restoreFromSession(){
  for(let gi=0;gi<MAX_GROUPS;gi++){let maxPi=-1;for(let pi=0;pi<20;pi++){const stored=sessionStorage.getItem(`nictCalc_g${gi}_p${pi}`);if(stored){if(!groupData[gi].pages[pi])groupData[gi].pages[pi]=JSON.parse(stored);maxPi=Math.max(maxPi,pi);}}groupData[gi].pageCount=maxPi+1;}
}

// ================================================================
// 初始化
// ================================================================
function init(){loadTheme();restoreFromSession();renderGroupTabs();document.getElementById('groupLabel').textContent=GROUP_NAMES[currentGroup];renderAllPages();updatePageLabel();initFillHandle();}
init();
</script>
